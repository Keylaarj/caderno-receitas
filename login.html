<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Caderno de Receitas</title>
    <link rel="stylesheet" href="cadastroLoginStyle.css">
</head>
<body>
    <header class="cabecalho">
        <div class="logosistema">
            <img src="imagens/logo.svg" alt="logo">
        </div>
        <h1 class="nomedosistema">Caderno de Receitas</h1>
    </header>

    <section class="containerautenticacao">
        <div class="cardautenticacao">
            <h2>Entrar no Sistema</h2>
            <form id="formlogin">
                <label for="loginemail">E-mail:</label>
                <input type="email" id="loginemail" placeholder="seuemail@exemplo.com" required>

                <label for="loginsenha">Senha:</label>
                <input type="password" id="loginsenha" placeholder="Sua senha" required>

                <div class="botoesautenticacao">
                    <button type="submit" id="botaologin" class="botaoprimario">Entrar</button>
                </div>
            </form>
            <p class="linkcadastro">
                Ainda não tem uma conta? <a href="cadastro.html">Cadastre-se aqui</a>
            </p>
        </div>
    </section>
    <script src="js/auth.js"></script>
</body>
</html>
