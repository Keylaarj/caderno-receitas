<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caderno de Receitas</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="cabecalho">
      <div class="logosistema">
        <img src="imagens/logo.svg" alt="logo" />
      </div>
      <h1 class="nomedosistema">Caderno de Receitas</h1>
      <nav class="botaomenu">
        <img src="imagens/menu.svg" alt="menu" />
      </nav>
    </header>

    <div
      style="
        max-width: 1200px;
        margin: 10px auto 0;
        padding: 0 15px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
      "
    >
      <span
        id="nomeusuario"
        style="margin-right: 15px; font-weight: bold"
      ></span>
      <button
        id="botaosair"
        style="
          background: #bb6401;
          color: white;
          padding: 8px 16px;
          border-radius: 50px;
          border: none;
          cursor: pointer;
        "
      >
        Sair
      </button>
    </div>

    <main class="areareceitas">
      <h1 class="nomesistema">Receitas</h1>
      <button id="botaonovareceita" class="botaonovareceita">
        + Nova receita
      </button>
      <div
        id="containercards"
        style="display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px"
      ></div>
    </main>

    <div
      id="criarreceita"
      class="modal-overlay"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
        z-index: 9999;
      "
    >
      <div
        class="modal-conteudo"
        style="
          background: #fff8e7;
          padding: 25px;
          border-radius: 12px;
          max-width: 500px;
          width: 90%;
          max-height: 90vh;
          overflow-y: auto;
        "
      >
        <h2 class="titulomodal">Nova Receita</h2>
        <form id="formreceita" class="form-receita">
          <label for="formnome">Nome do alimento:</label>
          <input type="text" id="formnome" required />

          <label for="formtempo">Tempo de preparo:</label>
          <input type="text" id="formtempo" placeholder="Ex: 30min" />

          <label for="formdificuldade">Dificuldade:</label>
          <input type="text" id="formdificuldade" placeholder="Ex: Fácil" />

          <label for="formporcoes">Porções base:</label>
          <input type="number" id="formporcoes" min="1" max="12" value="1" />

          <label for="formingredientes">Ingredientes (um por linha):</label>
          <textarea
            id="formingredientes"
            placeholder="Ex: 200g de farinha de trigo"
            required
          ></textarea>

          <label for="formprocedimento"
            >Modo de preparo (um passo por linha):</label
          >
          <textarea id="formprocedimento" required></textarea>

          <label for="formfoto">Foto:</label>
          <input type="file" id="formfoto" accept="image/*" />

          <div
            class="botoes-modal"
            style="
              display: flex;
              justify-content: flex-end;
              gap: 10px;
              margin-top: 15px;
            "
          >
            <button
              type="button"
              id="botaocancelar"
              class="btn-cancelar"
              style="
                background: #bbb;
                color: #333;
                padding: 8px 16px;
                border-radius: 6px;
                border: none;
                cursor: pointer;
              "
            >
              Cancelar
            </button>
            <button
              type="submit"
              class="btn-salvar"
              style="
                background: #d96b27;
                color: white;
                padding: 8px 16px;
                border-radius: 6px;
                border: none;
                cursor: pointer;
                font-weight: bold;
              "
            >
              Salvar
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="js/dados.js"></script>
    <script src="js/index.js"></script>
  </body>
</html>
