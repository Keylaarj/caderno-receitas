<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Receita</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="cabecalho">
        <div class="logosistema">
            <img src="imagens/logo.svg" alt="logo" />
        </div>
        <h1 class="nomedosistema" id="titulonavbar">Caderno de Receitas</h1>
        <nav class="botaomenu">
            <img src="imagens/menu.svg" alt="menu" />
        </nav>
    </header>

    <div style="max-width: 1100px; margin: 15px auto 0; padding: 0 15px; display: flex; justify-content: space-between; align-items: center;">
        <button id="botaovoltar" class="voltar-btn">← Voltar</button>
        <div style="display: flex; gap: 10px;">
            <button id="botaoeditar" style="background: #27ae60; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold;">Editar</button>
            <button id="botaoexcluir" style="background: #c0392b; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold;">Excluir</button>
        </div>
    </div>

    <main class="areareceita-detalhe">
        <article class="carddetalhe">
            <div class="cabecalhodetalhe">
                <div class="imagemdetalhe">
                    <img id="receitaimagem" src="imagens/comida.jpeg" alt="Foto da receita" />
                </div>
                <div class="infoprincipal">
                    <h1 id="receitatitulo" class="titulodetalhe">Nome da Receita</h1>
                    <div class="etiquetas">
                        <span id="receitatempo" class="etiquetatempo">0min</span>
                        <span id="receitadificuldade" class="etiquetadificuldade">Fácil</span>
                    </div>
                </div>
                <div class="caixaporcoes">
                    <label for="seletorporcoes">Porções:</label>
                    <select id="seletorporcoes" class="contadorporcoes"></select>
                </div>
            </div>

            <div class="conteudoreceita">
                <section class="colunaingredientes">
                    <h2 class="subtitulodetalhe">Ingredientes</h2>
                    <ul id="listaingredientes" class="listaingredientes"></ul>
                </section>
                <section class="colunaprocedimento">
                    <h2 class="subtitulodetalhe">Procedimento</h2>
                    <ol id="listaprocedimento" class="listaprocedimento"></ol>
                </section>
            </div>
        </article>
    </main>

    <div id="modalreceita" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 9999;">
        <div class="modal-conteudo" style="background: #fff8e7; padding: 25px; border-radius: 12px; max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto;">
            <h2 class="titulomodal" style="color: #8a3b0e; text-align: center; margin-bottom: 15px;">Editar Receita</h2>
            <form id="formreceita" class="form-receita" style="display: flex; flex-direction: column; gap: 10px;">
                <label for="formnome" style="font-weight: bold; color: #8a3b0e;">Nome do alimento:</label>
                <input type="text" id="formnome" required style="padding: 8px; border-radius: 6px; border: 1px solid #ccc;">
                
                <label for="formtempo" style="font-weight: bold; color: #8a3b0e;">Tempo de preparo:</label>
                <input type="text" id="formtempo" placeholder="Ex: 30min" style="padding: 8px; border-radius: 6px; border: 1px solid #ccc;">
                
                <label for="formdificuldade" style="font-weight: bold; color: #8a3b0e;">Dificuldade:</label>
                <input type="text" id="formdificuldade" placeholder="Ex: Fácil" style="padding: 8px; border-radius: 6px; border: 1px solid #ccc;">
                
                <label for="formporcoes" style="font-weight: bold; color: #8a3b0e;">Porções base:</label>
                <input type="number" id="formporcoes" min="1" max="12" value="1" style="padding: 8px; border-radius: 6px; border: 1px solid #ccc;">
                
                <label for="formingredientes" style="font-weight: bold; color: #8a3b0e;">Ingredientes (um por linha):</label>
                <textarea id="formingredientes" required style="padding: 8px; border-radius: 6px; border: 1px solid #ccc; height: 80px;"></textarea>
                
                <label for="formprocedimento" style="font-weight: bold; color: #8a3b0e;">Modo de preparo (um passo por linha):</label>
                <textarea id="formprocedimento" required style="padding: 8px; border-radius: 6px; border: 1px solid #ccc; height: 80px;"></textarea>
                
                <label for="formfoto" style="font-weight: bold; color: #8a3b0e;">Foto:</label>
                <input type="file" id="formfoto" accept="image/*">
                
                <div class="botoes-modal" style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px;">
                    <button type="button" id="botaocancelar" style="background: #bbb; color: #333; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer;">Cancelar</button>
                    <button type="submit" style="background: #d96b27; color: white; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold;">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/dados.js"></script>
    <script src="js/receita.js"></script>
</body>
</html>
